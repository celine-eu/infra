{{- if and .Values.backup.enabled (not .Values.backup.gcs.applicationCredentials) }}
apiVersion: v1
kind: Secret
metadata:
  name: cnpg-backup-s3
type: Opaque
stringData:
  S3_ACCESS_KEY_ID: {{ .Values.backup.s3.accessKey | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.backup.s3.secretKey | quote }}
  S3_ENDPOINT_URL: {{ .Values.backup.s3.endpointURL | quote }}
{{- end }}
