## ----------------------------------------------------------------------------
## celine-flexibility-api — values.yaml
##
## Defaults for all environments.
## Per-environment overrides live in envs/<env>/celine-flexibility-api.yaml
## and are applied by helmfile.
##
## Secret values (marked [secret]) are passed via SOPS-encrypted files
## in envs/<env>/secrets.yaml — never committed in plaintext.
## ----------------------------------------------------------------------------

fullnameOverride: flexibility-api

# ------------------------------------------------------------------------------
# Image
# ------------------------------------------------------------------------------
image:
  repository: ghcr.io/celine-eu/flexibility-api
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

# ------------------------------------------------------------------------------
# Service
# ------------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8017

# ------------------------------------------------------------------------------
# Ingress
# ------------------------------------------------------------------------------
ingress:
  enabled: false
  domain: celine.test
  host: "flexibility-api.celine.test"
  issuer: celine-tls
  auth:
    enabled: true
  tls:
    enabled: true
    secretName: ""
  annotations: {}

# ------------------------------------------------------------------------------
# OIDC
# ------------------------------------------------------------------------------
oidc:
  baseUrl: "http://keycloak/realms/celine"
  jwksUri: "http://keycloak/realms/celine/protocol/openid-connect/certs"
  allowedAudiences: ""
  includeClientIdAsAudience: true
  timeout: 10.0

  service:
    clientId: "svc-flexibility"
    audience: "svc-flexibility"
    clientSecret: "svc-flexibility" # [secret] — set via SOPS in envs/<env>/secrets.yaml

# ------------------------------------------------------------------------------
# Policies
# ------------------------------------------------------------------------------
policies:
  dir: "/app/policies"
  dataDir: ""
  cacheEnabled: true
  cacheTtl: 300
  cacheMaxsize: 10000

# ------------------------------------------------------------------------------
# Postgres
# ------------------------------------------------------------------------------
postgres:
  existingSecret: "postgis1-flexibility-api-connection-string"
  dsnEnvVar: "DATABASE_URL"
  secretKey: "connection-string"

# ------------------------------------------------------------------------------
# S3
# ------------------------------------------------------------------------------
s3:
  endpointUrl: ""
  region: "us-east-1"
  existingSecret: ""

# ------------------------------------------------------------------------------
# Migrate
# ------------------------------------------------------------------------------
migrate:
  enabled: true
  command: ["alembic", "upgrade", "head"]
  extraEnv: []

# ------------------------------------------------------------------------------
# Health check
# ------------------------------------------------------------------------------
healthCheck:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3

# ------------------------------------------------------------------------------
# Config volume
# ------------------------------------------------------------------------------
configMap:
  enabled: false
  name: ""
  mountPath: /app/config
  data: {}

volumeMounts: []
volumes: []

# ------------------------------------------------------------------------------
# Application
# ------------------------------------------------------------------------------
logLevel: "INFO"
extraEnv:
  - name: NUDGING_API_URL
    value: http://nudging:8016
  - name: DIGITAL_TWIN_API_URL
    value: http://digital-twin:8002
  - name: REC_REGISTRY_URL
    value: http://rec-registry:8004

  - name: CELINE_MQTT_HOST
    valueFrom:
      secretKeyRef:
        name: mqtt-account-admin
        key: MQTT_BROKER
extraSecrets: {}

# ------------------------------------------------------------------------------
# Pod
# ------------------------------------------------------------------------------
podAnnotations: {}
podSecurityContext:
  runAsUser: 1000
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
nodeSelector: {}
tolerations: []
affinity: {}
