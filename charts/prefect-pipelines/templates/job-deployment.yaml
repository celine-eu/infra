{{- range .Values.flows }}
apiVersion: batch/v1
kind: Job
metadata:
  name: prefect-deploy-{{ .name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: prefect-pipeline-deploy

spec:
  ttlSecondsAfterFinished: 30
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: prefect-worker
      {{- if .imageSecret }}
      imagePullSecrets:
        - name: {{ .imageSecret }}
      {{- end }}
      containers:
        - name: prefect-deploy-{{ .name }}
          image: {{ .image }}
          imagePullPolicy: {{ .pullPolicy | default "IfNotPresent" }}
          env:
            # Render all global envs
            {{- range $.Values.global.env }}
            {{- if .value }}
            - name: {{ .name }}
              value: "{{ .value }}"
            {{- else if .secret }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secret }}
                  key: {{ default .name .key }}
            {{- end }}
            {{- end }}

            # Render all flow-level envs
            {{- range .env }}
            {{- if .value }}
            - name: {{ .name }}
              value: "{{ .value }}"
            {{- else if .secret }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secret }}
                  key: {{ default .name .key }}
            {{- end }}
            {{- end }}

          resources:
            {{- if .resources }}
            {{- toYaml .resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: "250m"
              memory: "512Mi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "1"
              memory: "1Gi"
              ephemeral-storage: "4Gi"
            {{- end }}
          command:
            - "bash"
            - "-c"
            - |
              set -eux
              echo "Building prefect.yaml for {{ .name }}"
              mkdir -p /config

              cat > /config/prefect.yaml <<EOF
              name: {{ .name }}-deployment
              deployments:
                - name: {{ .name }}-flow
                  description: "{{ .name }} prefect deployment"
                  entrypoint: "{{ .path }}:{{ .callback }}"

                  # run once at time, assume idempotency
                  concurrency_limit: {{ .concurrencyLimit | default 1 }}
                  collision_strategy: SKIP

                  schedule:
                    cron: {{ (.schedule).cron | default "0 * * * *" | quote }}
                    # catchup: false
                    # active: true

                  work_pool:
                    name: {{ $.Values.global.work_pool }}
                    job_variables:
                      name: pipeline-run-{{ .name }}
                      {{- if .imageSecret }}
                      image_pull_secrets:
                        - name: {{ .imageSecret }}
                      {{- end }}
                      finished_job_ttl: {{ .finishedJobTTL | default "60" }}
                      image_pull_policy: IfNotPresent
                      image: {{ .image }}
                      namespace: {{ $.Values.global.namespace }}
                      env:
                      {{- range (concat $.Values.global.env .env) }}
                      {{- if .value }}
                                {{ .name }}: "{{ .value }}"
                      {{- else }}
                                {{ .name }}: "$${{ .name }}"
                      {{- end }}
                      {{- end }}
              EOF

              echo "Generated /config/prefect.yaml:"
              cat /config/prefect.yaml

              echo "Registering Prefect deployment for {{ .name }}"
              prefect deploy --prefect-file /config/prefect.yaml
              echo ""
              cat /config/prefect.yaml
---
{{- end }}
