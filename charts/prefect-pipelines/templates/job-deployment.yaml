{{- range $i, $flow := .Values.flows }}
apiVersion: batch/v1
kind: Job
metadata:
  name: prefect-deploy-{{ $flow.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: prefect-pipeline-deploy

spec:
  ttlSecondsAfterFinished: 30
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: prefect-worker
      {{- if $flow.imageSecret }}
      imagePullSecrets:
        - name: {{ $flow.imageSecret }}
      {{- end }}
      containers:
        - name: prefect-deploy-{{ $flow.name }}
          image: {{ $flow.image }}
          imagePullPolicy: {{ $flow.pullPolicy | default "IfNotPresent" }}
          env:
            # Render all global envs
            {{- range $.Values.global.env }}
            {{- if .value }}
            - name: {{ .name }}
              value: "{{ .value }}"
            {{- else if .secret }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secret }}
                  key: {{ default .name .key }}
            {{- end }}
            {{- end }}

            # Render all flow-level envs
            {{- range $flow.env }}
            {{- if .value }}
            - name: {{ .name }}
              value: "{{ .value }}"
            {{- else if .secret }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secret }}
                  key: {{ default .name .key }}
            {{- end }}
            {{- end }}

          resources:
            {{- if $flow.resources }}
            {{- toYaml $flow.resources | nindent 12 }}
            {{- else }}
            requests:
              cpu: "125m"
              memory: "128Mi"
              ephemeral-storage: "500m"
            limits:
              cpu: "1"
              memory: "1Gi"
              ephemeral-storage: "4Gi"
            {{- end }}
          command:
            - "bash"
            - "-c"
            - |
              set -eux
              sleep {{ $i }}
              echo "Building prefect.yaml for {{ $flow.name }}"
              mkdir -p /config

              cat > /config/prefect.yaml <<EOF
              name: {{ $flow.name }}-deployment
              deployments:
                - name: {{ $flow.name }}-flow
                  description: "{{ $flow.name }} prefect deployment"
                  entrypoint: "{{ $flow.path }}:{{ $flow.callback }}"

                  # run once at time, assume idempotency
                  concurrency_limit: {{ $flow.concurrencyLimit | default 1 }}
                  collision_strategy: SKIP

                  schedule:
                    cron: {{ ($flow.schedule).cron | default "0 * * * *" | quote }}
                    # catchup: false
                    # active: true

                  work_pool:
                    name: {{ $.Values.global.work_pool }}
                    job_variables:
                      name: pipeline-run-{{ $flow.name }}
                      {{- if $flow.imageSecret }}
                      image_pull_secrets:
                        - name: {{ $flow.imageSecret }}
                      {{- end }}
                      finished_job_ttl: {{ $flow.finishedJobTTL | default "60" }}
                      image_pull_policy: IfNotPresent
                      image: {{ $flow.image }}
                      namespace: {{ $.Values.global.namespace }}
                      env:
                      {{- range (concat $.Values.global.env $flow.env) }}
                      {{- if .value }}
                                {{ .name }}: "{{ .value }}"
                      {{- else }}
                                {{ .name }}: "$${{ .name }}"
                      {{- end }}
                      {{- end }}
              EOF

              echo "Generated /config/prefect.yaml:"
              cat /config/prefect.yaml

              echo "Registering Prefect deployment for {{ $flow.name }}"
              prefect deploy --prefect-file /config/prefect.yaml
              echo ""
              cat /config/prefect.yaml
---
{{- end }}
