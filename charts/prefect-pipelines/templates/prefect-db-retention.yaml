{{- if .Values.retention.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: prefect-db-retention
  namespace: {{ $.Values.global.namespace }}
spec:
  schedule: {{ .Values.retention.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ .Values.retention.activeDeadlineSeconds }}
      backoffLimit: {{ .Values.retention.backoffLimit }}
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: cleanup
              image: postgres:16
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              env:
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: postgis1-prefect-connection-string
                      key: host
                - name: PGPORT
                  value: "5432"
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: postgis1-prefect-connection-string
                      key: dbname
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgis1-prefect-connection-string
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgis1-prefect-connection-string
                      key: password
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  RETENTION_DAYS={{ .Values.retention.flowRunMaxAgeDays }}
                  EVENTS_DAYS={{ .Values.retention.eventsMaxAgeDays }}
                  BATCH={{ .Values.retention.batchSize }}
                  MAX_ITER={{ .Values.retention.maxIterations }}
                  SLEEP_MS={{ .Values.retention.sleepMs }}

                  sleep_between() {
                    sleep $(awk "BEGIN{printf \"%.3f\", $SLEEP_MS/1000}")
                  }

                  run_batch() {
                    local label=$1
                    local sql=$2
                    local iteration=0
                    while [ $iteration -lt $MAX_ITER ]; do
                      if ! output=$(psql -tA -v ON_ERROR_STOP=1 <<SQL 2>&1
                        SET lock_timeout = '{{ .Values.retention.lockTimeout }}';
                        SET statement_timeout = '{{ .Values.retention.statementTimeout }}';
                        $sql
                  SQL
                      ); then
                        echo "[${label} iter ${iteration}] lock/timeout, skipping: $output"
                        iteration=$((iteration + 1))
                        sleep_between
                        continue
                      fi
                      deleted=$(echo "$output" | tail -1)
                      echo "[${label} iter ${iteration}] deleted: ${deleted}"
                      if [ "$deleted" -eq 0 ]; then break; fi
                      iteration=$((iteration + 1))
                      sleep_between
                    done
                  }

                  echo "=== Prefect Retention Start: $(date -Iseconds) ==="

                  # 1. Flow runs — CASCADE handles flow_run_state, task_run, task_run_state
                  run_batch "flow_run" "
                    WITH to_delete AS (
                      SELECT id FROM flow_run
                      WHERE state_type IN ('COMPLETED','FAILED','CANCELLED','CRASHED')
                        AND start_time < now() - interval '${RETENTION_DAYS} days'
                      ORDER BY start_time
                      LIMIT $BATCH
                    ),
                    deleted AS (
                      DELETE FROM flow_run fr
                      USING to_delete t WHERE fr.id = t.id
                      RETURNING 1
                    )
                    SELECT count(*) FROM deleted;
                  "

                  # 2. Orphan logs — LEFT JOIN is more index-friendly than NOT EXISTS
                  run_batch "orphan_log" "
                    WITH to_delete AS (
                      SELECT l.id FROM log l
                      LEFT JOIN flow_run fr ON fr.id = l.flow_run_id
                      WHERE l.flow_run_id IS NOT NULL
                        AND fr.id IS NULL
                      LIMIT $BATCH
                    ),
                    deleted AS (
                      DELETE FROM log l
                      USING to_delete t WHERE l.id = t.id
                      RETURNING 1
                    )
                    SELECT count(*) FROM deleted;
                  "

                  # 3. Orphan artifacts
                  run_batch "orphan_artifact" "
                    WITH to_delete AS (
                      SELECT a.id FROM artifact a
                      LEFT JOIN flow_run fr ON fr.id = a.flow_run_id
                      WHERE a.flow_run_id IS NOT NULL
                        AND fr.id IS NULL
                      LIMIT $BATCH
                    ),
                    deleted AS (
                      DELETE FROM artifact a
                      USING to_delete t WHERE a.id = t.id
                      RETURNING 1
                    )
                    SELECT count(*) FROM deleted;
                  "

                  # 4. Old events — time-bounded so index on occurred is used cleanly
                  run_batch "events" "
                    WITH to_delete AS (
                      SELECT id FROM events
                      WHERE occurred < now() - interval '${EVENTS_DAYS} days'
                      ORDER BY occurred
                      LIMIT $BATCH
                    ),
                    deleted AS (
                      DELETE FROM events e
                      USING to_delete t WHERE e.id = t.id
                      RETURNING 1
                    )
                    SELECT count(*) FROM deleted;
                  "

                  # 5. Orphan event_resources
                  run_batch "orphan_event_resources" "
                    WITH to_delete AS (
                      SELECT er.id FROM event_resources er
                      LEFT JOIN events e ON e.id = er.event_id
                      WHERE e.id IS NULL
                      LIMIT $BATCH
                    ),
                    deleted AS (
                      DELETE FROM event_resources er
                      USING to_delete t WHERE er.id = t.id
                      RETURNING 1
                    )
                    SELECT count(*) FROM deleted;
                  "

                  # 6. VACUUM ANALYZE — separate psql calls, no statement_timeout
                  echo "Running VACUUM ANALYZE..."
                  psql -v ON_ERROR_STOP=1 -c "SET vacuum_cost_delay = '20ms'; VACUUM ANALYZE flow_run;"
                  psql -v ON_ERROR_STOP=1 -c "SET vacuum_cost_delay = '20ms'; VACUUM ANALYZE flow_run_state;"
                  psql -v ON_ERROR_STOP=1 -c "SET vacuum_cost_delay = '20ms'; VACUUM ANALYZE task_run;"
                  psql -v ON_ERROR_STOP=1 -c "SET vacuum_cost_delay = '20ms'; VACUUM ANALYZE task_run_state;"
                  psql -v ON_ERROR_STOP=1 -c "SET vacuum_cost_delay = '20ms'; VACUUM ANALYZE log;"
                  psql -v ON_ERROR_STOP=1 -c "SET vacuum_cost_delay = '20ms'; VACUUM ANALYZE artifact;"
                  psql -v ON_ERROR_STOP=1 -c "SET vacuum_cost_delay = '20ms'; VACUUM ANALYZE events;"
                  psql -v ON_ERROR_STOP=1 -c "SET vacuum_cost_delay = '20ms'; VACUUM ANALYZE event_resources;"
                  echo "VACUUM ANALYZE completed"

                  echo "=== Prefect Retention Done: $(date -Iseconds) ==="
{{- end }}
