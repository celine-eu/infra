{{- if .Values.retention.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: prefect-db-retention
  namespace: {{ $.Values.global.namespace }}
spec:
  schedule: {{ .Values.retention.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 900
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: cleanup
              image: postgres:16
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              env:
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: postgis1-prefect-connection-string
                      key: host
                - name: PGPORT
                  value: "5432"
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: postgis1-prefect-connection-string
                      key: dbname
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: postgis1-prefect-connection-string
                      key: username
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgis1-prefect-connection-string
                      key: password
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail

                  RETENTION_DAYS={{ .Values.retention.flowRunMaxAgeDays }}
                  EVENTS_DAYS={{ .Values.retention.eventsMaxAgeDays }}
                  BATCH={{ .Values.retention.batchSize }}
                  MAX_ITER={{ .Values.retention.maxIterations }}

                  echo "=== Prefect Retention Start: $(date -Iseconds) ==="

                  # 1. Flow runs terminati (CASCADE su flow_run_state, task_run, task_run_state)
                  iteration=0
                  while [ $iteration -lt $MAX_ITER ]; do
                    deleted=$(psql -tA -v ON_ERROR_STOP=1 <<SQL
                      SET lock_timeout = '{{ .Values.retention.lockTimeout }}';
                      SET statement_timeout = '{{ .Values.retention.statementTimeout }}';
                      WITH to_delete AS (
                        SELECT id FROM flow_run
                        WHERE state_type IN ('COMPLETED','FAILED','CANCELLED','CRASHED')
                          AND start_time < now() - interval '${RETENTION_DAYS} days'
                        ORDER BY start_time
                        LIMIT $BATCH
                      ),
                      deleted AS (
                        DELETE FROM flow_run fr
                        USING to_delete t WHERE fr.id = t.id
                        RETURNING 1
                      )
                      SELECT count(*) FROM deleted;
                  SQL
                    )
                    echo "[flow_run iter $iteration] deleted: $deleted"
                    if [ "$deleted" -eq 0 ]; then break; fi
                    iteration=$((iteration + 1))
                  done

                  # 2. Log orfani (nessuna FK)
                  iteration=0
                  while [ $iteration -lt $MAX_ITER ]; do
                    deleted=$(psql -tA -v ON_ERROR_STOP=1 <<SQL
                      SET lock_timeout = '{{ .Values.retention.lockTimeout }}';
                      SET statement_timeout = '{{ .Values.retention.statementTimeout }}';
                      WITH to_delete AS (
                        SELECT l.id FROM log l
                        WHERE l.flow_run_id IS NOT NULL
                          AND NOT EXISTS (
                            SELECT 1 FROM flow_run fr WHERE fr.id = l.flow_run_id
                          )
                        LIMIT $BATCH
                      ),
                      deleted AS (
                        DELETE FROM log l
                        USING to_delete t WHERE l.id = t.id
                        RETURNING 1
                      )
                      SELECT count(*) FROM deleted;
                  SQL
                    )
                    echo "[orphan log iter $iteration] deleted: $deleted"
                    if [ "$deleted" -eq 0 ]; then break; fi
                    iteration=$((iteration + 1))
                  done

                  # 3. Artifact orfani (nessuna FK)
                  iteration=0
                  while [ $iteration -lt $MAX_ITER ]; do
                    deleted=$(psql -tA -v ON_ERROR_STOP=1 <<SQL
                      SET lock_timeout = '{{ .Values.retention.lockTimeout }}';
                      SET statement_timeout = '{{ .Values.retention.statementTimeout }}';
                      WITH to_delete AS (
                        SELECT a.id FROM artifact a
                        WHERE a.flow_run_id IS NOT NULL
                          AND NOT EXISTS (
                            SELECT 1 FROM flow_run fr WHERE fr.id = a.flow_run_id
                          )
                        LIMIT $BATCH
                      ),
                      deleted AS (
                        DELETE FROM artifact a
                        USING to_delete t WHERE a.id = t.id
                        RETURNING 1
                      )
                      SELECT count(*) FROM deleted;
                  SQL
                    )
                    echo "[orphan artifact iter $iteration] deleted: $deleted"
                    if [ "$deleted" -eq 0 ]; then break; fi
                    iteration=$((iteration + 1))
                  done

                  # 4. Eventi vecchi
                  iteration=0
                  while [ $iteration -lt $MAX_ITER ]; do
                    deleted=$(psql -tA -v ON_ERROR_STOP=1 <<SQL
                      SET lock_timeout = '{{ .Values.retention.lockTimeout }}';
                      SET statement_timeout = '{{ .Values.retention.statementTimeout }}';
                      WITH to_delete AS (
                        SELECT id FROM events
                        WHERE occurred < now() - interval '${EVENTS_DAYS} days'
                        ORDER BY occurred
                        LIMIT $BATCH
                      ),
                      deleted AS (
                        DELETE FROM events e
                        USING to_delete t WHERE e.id = t.id
                        RETURNING 1
                      )
                      SELECT count(*) FROM deleted;
                  SQL
                    )
                    echo "[events iter $iteration] deleted: $deleted"
                    if [ "$deleted" -eq 0 ]; then break; fi
                    iteration=$((iteration + 1))
                  done

                  # 5. Event resources orfani (nessuna FK)
                  iteration=0
                  while [ $iteration -lt $MAX_ITER ]; do
                    deleted=$(psql -tA -v ON_ERROR_STOP=1 <<SQL
                      SET lock_timeout = '{{ .Values.retention.lockTimeout }}';
                      SET statement_timeout = '{{ .Values.retention.statementTimeout }}';
                      WITH to_delete AS (
                        SELECT er.id FROM event_resources er
                        WHERE NOT EXISTS (
                          SELECT 1 FROM events e WHERE e.id = er.event_id
                        )
                        LIMIT $BATCH
                      ),
                      deleted AS (
                        DELETE FROM event_resources er
                        USING to_delete t WHERE er.id = t.id
                        RETURNING 1
                      )
                      SELECT count(*) FROM deleted;
                  SQL
                    )
                    echo "[orphan event_resources iter $iteration] deleted: $deleted"
                    if [ "$deleted" -eq 0 ]; then break; fi
                    iteration=$((iteration + 1))
                  done

                  # 6. VACUUM ANALYZE (separate session, no statement_timeout)
                  echo "Running VACUUM ANALYZE..."
                  psql -v ON_ERROR_STOP=1 <<'SQL'
                    VACUUM ANALYZE flow_run;
                    VACUUM ANALYZE flow_run_state;
                    VACUUM ANALYZE task_run;
                    VACUUM ANALYZE task_run_state;
                    VACUUM ANALYZE log;
                    VACUUM ANALYZE artifact;
                    VACUUM ANALYZE events;
                    VACUUM ANALYZE event_resources;
                  SQL
                  echo "VACUUM ANALYZE completed"

                  echo "=== Prefect Retention Done: $(date -Iseconds) ==="
{{- end }}
