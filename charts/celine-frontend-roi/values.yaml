## ----------------------------------------------------------------------------
## celine-frontend-roi — values.yaml
## ----------------------------------------------------------------------------

fullnameOverride: frontend-roi

image:
  repository: ghcr.io/celine-eu/celine-frontend-roi
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 3004

ingress:
  enabled: true
  domain: celine.test
  host: "roi.celine.test"
  issuer: celine-tls

  roiBackend:
    service: roi
    port: 8000

  auth:
    enabled: false
  tls:
    enabled: true
    secretName: ""
  annotations: {}

healthCheck:
  enabled: true
  path: /
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3

extraEnv: []
podAnnotations: {}
podSecurityContext:
  runAsUser: 1000
resources:
  requests:
    cpu: 10m
    memory: 256Mi
  limits:
    cpu: 100m
    memory: 512Mi
nodeSelector: {}
tolerations: []
affinity: {}
