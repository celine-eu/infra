apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "celine-dataset-api-shell.fullname" . }}
  labels:
    {{- include "celine-dataset-api-shell.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "celine-dataset-api-shell.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "celine-dataset-api-shell.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: shell
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              echo "dataset-api shell ready"
              tail -f /dev/null
          env:
            # ----------------------------------------------------------------
            # PostgreSQL connection (used by `dataset-cli export postgres`)
            # ----------------------------------------------------------------
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.existingSecret }}
                  key: {{ .Values.postgres.secretKey }}
            # ----------------------------------------------------------------
            # Marquez URL (used by `dataset-cli export openlineage`)
            # ----------------------------------------------------------------
            - name: MARQUEZ_URL
              value: {{ .Values.marquez.url | quote }}
            # ----------------------------------------------------------------
            # Dataset API URL (convenience for `dataset-cli import catalogue`)
            # ----------------------------------------------------------------
            - name: DATASET_API_URL
              value: {{ .Values.datasetApi.url | quote }}
            # ----------------------------------------------------------------
            # Extra env vars (for ad-hoc use)
            # ----------------------------------------------------------------
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .secret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secret }}
                  key: {{ default .name .key }}
              {{- end }}
            {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
