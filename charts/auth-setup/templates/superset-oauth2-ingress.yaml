# Step 1: clear the oauth2-proxy session, redirect to /keycloak-logout.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: superset-oauth2-signout
  labels:
    app: superset-oauth2-signout
  annotations:
    cert-manager.io/issuer: {{ .Values.issuer | default "celine-tls" }}
    nginx.ingress.kubernetes.io/permanent-redirect: "https://sso.{{ .Values.domain }}/oauth2/sign_out?rd=https://superset.{{ .Values.domain }}/keycloak-logout"
    nginx.ingress.kubernetes.io/permanent-redirect-code: "302"
spec:
  ingressClassName: nginx
  rules:
    - host: superset.{{ .Values.domain }}
      http:
        paths:
          - path: /oauth2/sign_out
            pathType: Exact
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 80
  tls:
    - hosts:
        - superset.{{ .Values.domain }}
      secretName: superset-tls
---
# Step 2: send browser to Keycloak logout with post_logout_redirect_uri back to superset.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: superset-keycloak-logout
  labels:
    app: superset-keycloak-logout
  annotations:
    cert-manager.io/issuer: {{ .Values.issuer | default "celine-tls" }}
    nginx.ingress.kubernetes.io/permanent-redirect: "https://keycloak.{{ .Values.domain }}/realms/celine/protocol/openid-connect/logout?client_id=oauth2_proxy&post_logout_redirect_uri=https://superset.{{ .Values.domain }}/"
    nginx.ingress.kubernetes.io/permanent-redirect-code: "302"
spec:
  ingressClassName: nginx
  rules:
    - host: superset.{{ .Values.domain }}
      http:
        paths:
          - path: /keycloak-logout
            pathType: Exact
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 80
  tls:
    - hosts:
        - superset.{{ .Values.domain }}
      secretName: superset-tls
