## ----------------------------------------------------------------------------
## celine-dataset-api — values.yaml
## ----------------------------------------------------------------------------

fullnameOverride: dataset-api

image:
  repository: ghcr.io/celine-eu/dataset-api
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 8001

ingress:
  enabled: false
  domain: celine.test
  host: "dataset-api.celine.test"
  issuer: celine-tls
  auth:
    enabled: true
  tls:
    enabled: true
    secretName: ""
  annotations: {}

oidc:
  baseUrl: "http://keycloak/realms/celine"
  jwksUri: "http://keycloak/realms/celine/protocol/openid-connect/certs"
  allowedAudiences: ""
  includeClientIdAsAudience: true
  timeout: 10.0
  service:
    clientId: "svc-dataset-api"
    audience: "svc-dataset-api"
    clientSecret: "svc-dataset-api" # [secret]

policies:
  dir: "/app/policies"
  dataDir: ""
  cacheEnabled: true
  cacheTtl: 300
  cacheMaxsize: 10000

postgres:
  existingSecret: "postgis1-dataset-api-connection-string"
  dsnEnvVar: "DATABASE_URL"
  secretKey: "connection-string"

s3:
  endpointUrl: ""
  region: "us-east-1"
  existingSecret: "s3-account-user-rw"

migrate:
  enabled: false
  # command: ["alembic", "upgrade", "head"]
  # tmp fix
  command: ["/bin/sh", "-c", "/app/.venv/bin/alembic upgrade head"]
  extraEnv: []

healthCheck:
  enabled: true
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 30
  failureThreshold: 3

configMap:
  enabled: false
  name: ""
  mountPath: /app/config
  data: {}

volumeMounts: []
volumes: []

logLevel: "INFO"
extraEnv:
  - name: DATASETS_DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: postgis1-datasets-async-connection-string
        key: connection-string
  - name: REC_REGISTRY_URL
    value: "http://rec-registry:8004"

extraSecrets: {}

podAnnotations: {}
podSecurityContext:
  runAsUser: 1000
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 1Gi
nodeSelector: {}
tolerations: []
affinity: {}
