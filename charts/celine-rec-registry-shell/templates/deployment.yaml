apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "celine-rec-registry-shell.fullname" . }}
  labels:
    {{- include "celine-rec-registry-shell.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "celine-rec-registry-shell.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "celine-rec-registry-shell.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: shell
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              echo "rec-registry shell ready"
              tail -f /dev/null
          env:
            # ----------------------------------------------------------------
            # rec-registry CLI auth (envvar= names from main.py / CLISettings)
            # ----------------------------------------------------------------
            - name: REGISTRY_AUTH_URL
              value: {{ .Values.oidc.baseUrl | quote }}
            - name: REGISTRY_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            - name: REGISTRY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.existingSecret }}
                  key: {{ .Values.oidc.clientSecretKey }}
            # ----------------------------------------------------------------
            # Extra env vars (for ad-hoc use)
            # ----------------------------------------------------------------
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .secret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secret }}
                  key: {{ default .name .key }}
              {{- end }}
            {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
